<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Page</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f3f4f6;
  margin:0;
}

.container{
  max-width:900px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:12px;
}

img{
  width:100%;
  max-width:400px;
  border-radius:10px;
}

.price{
  font-size:24px;
  font-weight:bold;
  color:#b12704;
  margin:10px 0;
}

.rating{
  color:#f0c14b;
  font-size:18px;
  margin:5px 0;
}

.badge{
  display:inline-block;
  background:#ff3b30;
  color:#fff;
  padding:4px 8px;
  font-size:12px;
  border-radius:5px;
  margin-bottom:10px;
  font-weight:bold;
}

.btn{
  display:inline-block;
  margin-top:15px;
  background:#ffd814;
  padding:12px 18px;
  border-radius:8px;
  font-weight:bold;
  text-decoration:none;
  color:#111;
}

ul{
  margin-top:15px;
  padding-left:18px;
}
</style>
</head>

<body>

<div class="container" id="productBox">
  Loading product...
</div>

<script src="products.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

const product = products.find(p => p.id === id);

const box = document.getElementById("productBox");

if(product){

  const fullStars = Math.floor(product.rating);
const halfStar = product.rating % 1 >= 0.5 ? 1 : 0;
const emptyStars = 5 - fullStars - halfStar;

const stars = `
<span style="color:#f0c14b; font-size:18px;">
  ${"★".repeat(fullStars)}
  ${halfStar ? "⯪" : ""}
  ${"☆".repeat(emptyStars)}
</span>
<span style="color:#555; font-size:14px; margin-left:6px;">
  ${product.rating}
</span>
`;

  box.innerHTML = `
    
    <div class="badge">${product.badge || ""}</div>

    <img src="${product.image}">

    <h1>${product.title}</h1>

    <div class="rating">${stars}</div>

    <div class="price">${product.price}</div>

    <p>${product.short || product.description || ""}</p>

    <ul>
      <li>✔ Premium quality design</li>
      <li>✔ Trending product choice</li>
      <li>✔ Perfect for modern home styling</li>
    </ul>

    <a class="btn" href="${product.affiliate || '#'}" target="_blank">
      🛒 Buy Now
    </a>

  `;

}else{
  box.innerHTML = "<h2>Product not found</h2>";
}

</script>
  <script>
document.addEventListener("DOMContentLoaded", () => {
  const footer = document.createElement("footer");
  footer.innerHTML = `
    <p><strong>Elite Marketplace</strong></p>
    <p>#ad As an affiliate, I may earn from qualifying purchases.</p>
  `;

  footer.style.textAlign = "center";
  footer.style.padding = "20px";
  footer.style.fontSize = "12px";
  footer.style.color = "#555";
  footer.style.background = "#f3f4f6";

  document.body.appendChild(footer);
});
</script>

</body>
</html>
