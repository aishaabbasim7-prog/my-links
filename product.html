<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Page</title>

<style>
body{font-family:Arial;background:#f3f4f6;margin:0}
.container{max-width:900px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
img{width:100%;max-width:350px;border-radius:10px}
.price{color:#b12704;font-size:22px;font-weight:bold;margin:10px 0}
.rating{color:#f0c14b}
.btn{display:inline-block;background:#ffd814;padding:12px 18px;border-radius:8px;text-decoration:none;font-weight:bold;color:#111;margin-top:10px}
</style>
</head>

<body>

<div class="container" id="productBox"></div>

<script src="products.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

const product = products.find(p => p.id === id);

const box = document.getElementById("productBox");

if(product){
  box.innerHTML = `
    <img src="${product.image}">
    <h1>${product.title}</h1>
    <div class="rating">${product.rating}</div>
    <div class="price">${product.price}</div>
    <p>${product.desc}</p>

    <a class="btn" href="${product.link}" target="_blank">
      🛒 Buy Now
    </a>
  `;
}else{
  box.innerHTML = "<h2>Product not found</h2>";
}

</script>

</body>
</html>
