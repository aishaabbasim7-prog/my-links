<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.container{max-width:900px;margin:30px auto;background:#fff;padding:20px;border-radius:10px}
img{width:100%;max-width:400px;border-radius:10px}
.price{font-size:24px;color:#b12704;font-weight:bold}
.rating{color:#f0c14b}
.btn{display:inline-block;background:#ffd814;padding:12px 18px;margin-top:10px;border-radius:8px;font-weight:bold;text-decoration:none}
</style>
</head>

<body>

<div class="container" id="box"></div>

<script src="products.js"></script>

<script>

const id = new URLSearchParams(window.location.search).get("id");

const p = products.find(x => x.id === id);

const box = document.getElementById("box");

if(p){

  const stars = "★".repeat(p.rating) + "☆".repeat(5 - p.rating);

  box.innerHTML = `
    <img src="${p.image}">
    <h1>${p.title}</h1>
    <div class="rating">${stars}</div>
    <div class="price">${p.price}</div>
    <p>${p.description}</p>

    <a class="btn" href="${p.affiliate}" target="_blank">
      🛒 Buy Now
    </a>
  `;
}else{
  box.innerHTML = "<h2>Product not found</h2>";
}

</script>

</body>
</html>
