<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Marketplace | Affiliate Store</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;background:#f3f4f6}

/* HEADER */
.topbar{background:#131921;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:15px}
.logo img{height:38px}
.brand{font-size:18px;font-weight:600}
.search{flex:1;position:relative}
.search input{width:100%;padding:10px;border:none;border-radius:6px}

/* NAV */
.nav{background:#232f3e;color:#fff;padding:10px 20px;display:flex;gap:15px;flex-wrap:wrap}
.nav a{color:#fff;text-decoration:none;font-size:13px;opacity:0.9}

/* HERO SLIDER */
.hero{
  height:330px;
  display:flex;
  align-items:center;
  padding-left:50px;
  color:#fff;
  background-size:cover;
  background-position:center;
  transition:0.6s ease-in-out;
}
.hero-box{
  background:rgba(0,0,0,0.6);
  padding:20px;
  border-radius:10px;
  max-width:420px;
}
.hero-box h1{margin:0;font-size:26px}
.hero-box p{font-size:14px;margin:10px 0}
.hero-box a{background:#ffd814;color:#111;padding:10px 14px;border-radius:6px;text-decoration:none;font-weight:bold}

.container{max-width:1200px;margin:auto;padding:20px}
.section-title{font-size:20px;margin:25px 0 10px}

/* TRUST */
.trust{display:flex;justify-content:space-around;background:#fff;padding:12px;border-radius:10px;margin-bottom:20px;font-size:13px}

/* PRODUCTS */
.row{background:#fff;padding:15px;border-radius:12px;margin-bottom:20px}
.scroll{display:flex;gap:15px;overflow-x:auto}

.card{min-width:200px;background:#fff;border-radius:10px;padding:10px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.card img{width:100%;border-radius:8px}
.title{font-size:13px;margin:8px 0;height:38px;overflow:hidden}
.price{font-weight:bold;color:#b12704}
.rating{font-size:12px;color:#f0c14b}
.btn{display:block;margin-top:8px;text-align:center;padding:8px;background:#ffd814;color:#111;text-decoration:none;border-radius:8px;font-weight:bold;font-size:13px}

.hidden{display:none !important}

/* MOBILE */
.sticky{display:none}
@media(max-width:768px){
.hero{padding-left:20px;height:260px}
.sticky{display:flex;position:fixed;bottom:0;width:100%;background:#fff;padding:10px}
.sticky a{flex:1;background:#ffd814;color:#111;text-align:center;padding:12px;border-radius:8px;text-decoration:none;font-weight:bold}
}

footer{text-align:center;padding:20px;font-size:12px;color:#555}
</style>
</head>

<body>

<!-- HEADER -->
<div class="topbar">
  <div class="logo"><img src="PASTE_LOGO_URL_HERE"></div>
  <div class="brand">YOUR BRAND NAME</div>

  <div class="search">
    <input id="searchBox" placeholder="Search products (e.g. pillow, lamp, gadget)..." onkeypress="handleSearch(event)">
  </div>
</div>

<!-- NAV -->
<div class="nav">
  <a href="#decor">Home Decor</a>
  <a href="#gadgets">Gadgets</a>
  <a href="#deals">Deals</a>
</div>

<!-- HERO SLIDER -->
<div class="hero" id="hero">
  <div class="hero-box">
    <h1 id="heroTitle">Luxury Home Finds</h1>
    <p id="heroText">Discover trending products for modern living.</p>
    <a href="#deals" id="heroBtn">Shop Now</a>
  </div>
</div>

<div class="container">

<div class="trust">
  <span>✔ Secure Checkout</span>
  <span>✔ Trending Products</span>
  <span>✔ Verified Picks</span>
</div>

<!-- PRODUCTS -->
<div class="row" id="decor">
  <h3>🛋️ Home Decor</h3>
  <div class="scroll" id="decorList"></div>
</div>

  <div class="row" id="gadgets">
  <h3>⚡ Gadgets</h3>
  <div class="scroll" id="gadgetsList"></div>
</div>

<div class="sticky">
  <a href="#">🛒 Shop Now</a>
</div>

<footer>
<p>#ad As an affiliate, I may earn from qualifying purchases.</p>
</footer>
<script src="products.js"></script>

<script>

function renderStore(){

  const decorBox = document.getElementById("decorList");
  const gadgetBox = document.getElementById("gadgetsList");

  products.forEach(p=>{

    const ratingStars = "★".repeat(p.rating) + "☆".repeat(5 - p.rating);

    const card = `
      <a href="product.html?id=${p.id}" style="text-decoration:none;color:inherit;" target="_blank">
        <div class="card">

          <img src="${p.image}">

          <div class="title">${p.title}</div>

          <div class="rating">${ratingStars}</div>

          <div class="price">${p.price}</div>

          <div class="btn">Buy Now</div>

        </div>
      </a>
    `;

    if(p.category === "decor"){
      decorBox.innerHTML += card;
    }

    if(p.category === "gadgets"){
      gadgetBox.innerHTML += card;
    }

  });
}

renderStore();

/* SEARCH → Shopify style redirect */
function handleSearch(e){
  if(e.key === "Enter"){
    const q = document.getElementById("searchBox").value;
    window.location.href = "search.html?q=" + q;
  }
}

</script>

<script>

/* HERO SLIDER SYSTEM */
const slides=[
  {
    img:"https://images.unsplash.com/photo-1600585154340-be6161a56a0c",
    title:"Luxury Home Decor Deals",
    text:"Upgrade your space with premium aesthetic finds.",
    btn:"Shop Decor"
  },
  {
    img:"https://images.unsplash.com/photo-1615873968403-89e068629265",
    title:"Smart Gadgets Trending Now",
    text:"Discover viral tech gadgets everyone is buying.",
    btn:"Explore Gadgets"
  },
  {
    img:"https://images.unsplash.com/photo-1505693416388-ac5ce068fe85",
    title:"Limited Time Offers",
    text:"Best deals curated for high-value savings.",
    btn:"Grab Deals"
  }
];

let i=0;
function changeSlide(){
  document.getElementById("hero").style.backgroundImage=`url(${slides[i].img})`;
  document.getElementById("heroTitle").innerText=slides[i].title;
  document.getElementById("heroText").innerText=slides[i].text;
  document.getElementById("heroBtn").innerText=slides[i].btn;
  i=(i+1)%slides.length;
}
changeSlide();
setInterval(changeSlide,4000);

/* SEARCH SYSTEM (ENTER KEY FILTER) */
function handleSearch(e){
  if(e.key==='Enter'){
    let q=document.getElementById("searchBox").value.toLowerCase();
    let cards=document.querySelectorAll(".card");

    cards.forEach(c=>{
      let title=c.getAttribute("data-title");
      if(title.includes(q)) c.classList.remove("hidden");
      else c.classList.add("hidden");
    });
  }
}

</script>

</body>
</html>
