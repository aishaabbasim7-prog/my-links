<script>

/* PRODUCT DATABASE (MASTER SYSTEM) */
const products = [
  {
    id: "p1",
    title: "Luxury Velvet Pillow",
    price: "$19.99",
    rating: "★★★★★",
    category: "decor",
    image: "https://via.placeholder.com/300",
    desc: "Soft velvet cushion perfect for modern homes."
  },
  {
    id: "p2",
    title: "LED Smart Lamp",
    price: "$14.99",
    rating: "★★★★☆",
    category: "gadgets",
    image: "https://via.placeholder.com/300",
    desc: "Color changing smart lamp with remote control."
  }
];

/* LOAD PRODUCTS DYNAMICALLY */
function loadProducts(){
  const decorContainer = document.querySelector("#decor .scroll");
  const gadgetContainer = document.querySelector("#gadgets .scroll");

  products.forEach(p=>{
    const card = `
    <div class="card">
      <img src="${p.image}">
      <div class="title">${p.title}</div>
      <div class="rating">${p.rating}</div>
      <div class="price">${p.price}</div>
      <a class="btn" href="product.html?id=${p.id}" target="_blank">View Product</a>
    </div>
    `;

    if(p.category==="decor") decorContainer.innerHTML += card;
    if(p.category==="gadgets") gadgetContainer.innerHTML += card;
  });
}

loadProducts();

/* SEARCH REDIRECT SYSTEM */
function handleSearch(e){
  if(e.key==='Enter'){
    let q=document.getElementById("searchBox").value;
    window.location.href=`search.html?q=${q}`;
  }
}

</script>
