<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search</title>

<style>
body{font-family:Arial;background:#f5f5f5}
.container{padding:20px}
.card{
  background:#fff;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
  display:flex;
  gap:15px;
  align-items:center;
}
img{width:80px;border-radius:8px}
.btn{background:#ffd814;padding:8px 12px;border-radius:6px;text-decoration:none;font-weight:bold}
</style>
</head>

<body>

<h2 style="padding:10px">Search Results</h2>
<div class="container" id="results"></div>

<script src="products.js"></script>

<script>

const q = (new URLSearchParams(window.location.search).get("q") || "").toLowerCase();

const box = document.getElementById("results");

const results = products.filter(p =>
  p.title.toLowerCase().includes(q) ||
  (p.tags && p.tags.join(" ").toLowerCase().includes(q))
);

if(results.length === 0){
  box.innerHTML = "<p>No products found</p>";
}else{

  results.forEach(p=>{
    box.innerHTML += `
      <div class="card">
        <img src="${p.image}">
        <div>
          <h3>${p.title}</h3>
          <div>${"★".repeat(p.rating)}</div>
          <div><b>${p.price}</b></div>

          <a class="btn" href="product.html?id=${p.id}">
            View Product
          </a>
        </div>
      </div>
    `;
  });

}

</script>

</body>
</html>
