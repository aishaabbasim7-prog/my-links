<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Search</title>

<style>
  body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
  }
  .container {
    padding: 20px;
  }
  .card {
    background: #fff;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex; /* Keeps image on left, text on right */
    gap: 15px;
    align-items: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  }
  img {
    width: 100px; /* Slightly larger image */
    height: auto;
    border-radius: 8px;
  }
  
  /* 🌟 NEW: This controls the text area next to the image */
  .card-info {
    display: flex;
    flex-direction: column;
    gap: 8px; /* Adds equal space between title, rating, and price */
  }

  .btn {
    background: #ffd814;
    padding: 8px 12px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    color: #111;
    display: inline-block;
    margin-top: 10px; /* 🚀 This pushes the button down away from the price */
    width: fit-content;
  }
  
  h3 {
    margin: 0;
    font-size: 18px;
  }
</style>

</head>

<body>

<h2 style="padding:10px">Search Results</h2>
<div class="container" id="results"></div>

<script src="products.js"></script>

<script>

const q = (new URLSearchParams(window.location.search).get("q") || "").toLowerCase();

const box = document.getElementById("results");

const results = products.filter(p =>
  p.title.toLowerCase().includes(q) ||
  (p.tags && p.tags.join(" ").toLowerCase().includes(q))
);

if(results.length === 0){
  box.innerHTML = "<p>No products found</p>";
}else{

results.forEach(p=>{
  box.innerHTML += `
    <div class="card" style="display: flex; align-items: center; background: #fff; padding: 15px; margin-bottom: 15px; border-radius: 10px; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
      <img src="${p.image}" style="width: 100px; height: auto; border-radius: 8px;">
      <div style="display: flex; flex-direction: column; gap: 5px;"> 
        <h3 style="margin: 0; font-size: 18px;">${p.title}</h3>
        <div style="color: #f0c14b;">${"★".repeat(p.rating)}</div>
        <div style="margin-bottom: 10px;"><b>${p.price}</b></div> 
        <a href="product.html?id=${p.id}" style="background: #ffd814; padding: 10px 15px; border-radius: 6px; text-decoration: none; font-weight: bold; color: #111; width: fit-content; display: inline-block;"> 
          View Product 
        </a>
      </div>
    </div>
  `;
});


}

</script>

</body>
</html>
